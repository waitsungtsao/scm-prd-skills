# 约束索引 — 自动生成，每次 PRD 交付时更新对应条目
# 读取时机：新 PRD 启动时（SKILL.md 初始化步骤 4）
# 写入时机：PRD 交付时（review-guide.md 最终交付）
# 语义规则：每次只更新本 PRD 条目（按 prd_id 匹配），不修改其他条目
#
# 生命周期状态（status）：
#   活跃     — 已交付，仍对新 PRD 构成约束（默认值）
#   已归档   — 已实施上线，接口/实体约束仍有效，但不出现在修订入口列表
#   已废弃   — 被其他 PRD 替代（见 superseded_by），跨 PRD 扫描时跳过
#
# 向后兼容：旧条目缺少 domain_tags / superseded_by 时，
#   domain_tags 默认 []，superseded_by 默认 null，status 缺省视为"活跃"
#
# 未来扩展：当条目超过 ~50 个且 AI 上下文消耗明显时，可拆为两级索引：
#   _constraints-index.yaml          — 轻量摘要（prd_id/version/status/domain_tags/scope）
#   _constraints-detail/{prd_id}.yaml — 完整约束（goals/functions/entities/interfaces/rules）

- prd_id: REQ-20260315-order-split          # requirement_id（唯一键）
  prd_file: REQ-20260315-order-split/PRD-order-split.md
  version: V1.2
  status: 活跃                               # 活跃 | 已归档 | 已废弃
  domain_tags: [OMS, WMS]                    # 从 scope_in 提取的系统缩写受控词表
  superseded_by: null                        # 被替代时填入替代 PRD 的 prd_id
  requirement_type: update                   # new | update | mixed
  last_updated: 2026-03-20
  goals:                                     # 来源：§2.4
    - { id: G-01, summary: "拆单准确率≥99.5%" }
    - { id: G-02, summary: "减少手动拆单工作量50%" }
  scope_in:                                  # 来源：§2.5 纳入范围
    - "OMS拆单逻辑"
    - "WMS接收拆单指令"
  scope_out:                                 # 来源：§2.5 排除范围
    - "TMS运输调度"
  changes:                                   # 来源：§4，仅 update/mixed 类型
    - { id: C-01, summary: "拆分规则增加承运商维度", impact_systems: [OMS, WMS] }
  functions:                                 # 来源：§6，仅列 ID + 名称
    - { id: F-001, name: "自动拆单" }
    - { id: F-002, name: "手动拆单" }
  entities:                                  # 来源：§7.2
    - { name: split_order, status: new, owner: OMS }
  interfaces:                                # 来源：§7.4
    - { id: IF-001, name: "拆单推送", direction: "OMS→WMS", key_fields: [order_no, split_seq, warehouse_code] }
  key_rules:                                 # 来源：§6 中的关键规则摘要
    - { function: F-001, summary: "同仓+同承运商合并，跨仓拆分" }
