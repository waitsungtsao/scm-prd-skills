diagram:
  title: "电商订单核心数据模型"
  type: er

entities:
  - id: user
    label: "用户 USER"
    color: blue
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "主键"
      - name: email
        type: VARCHAR(120)
        comment: "登录邮箱（唯一）"
      - name: phone
        type: VARCHAR(20)
        comment: "联系电话"
      - name: created_at
        type: TIMESTAMP
        comment: "注册时间"

  - id: order
    label: "订单 ORDER"
    color: green
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "主键"
      - name: order_no
        type: VARCHAR(32)
        comment: "订单号（业务唯一）"
      - name: user_id
        type: BIGINT
        fk: user
        comment: "下单用户"
      - name: address_id
        type: BIGINT
        fk: address
        comment: "收货地址"
      - name: status
        type: VARCHAR(20)
        comment: "订单状态"
      - name: total_amount
        type: DECIMAL(12,2)
        comment: "订单金额"

  - id: order_item
    label: "订单项 ORDER_ITEM"
    color: green
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "主键"
      - name: order_id
        type: BIGINT
        fk: order
        comment: "所属订单"
      - name: product_id
        type: BIGINT
        fk: product
        comment: "商品"
      - name: quantity
        type: INT
        comment: "数量"
      - name: unit_price
        type: DECIMAL(10,2)
        comment: "下单时单价"

  - id: product
    label: "商品 PRODUCT"
    color: orange
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "主键"
      - name: sku
        type: VARCHAR(40)
        comment: "SKU 编码"
      - name: name
        type: VARCHAR(200)
        comment: "商品名"
      - name: price
        type: DECIMAL(10,2)
        comment: "当前售价"

  - id: address
    label: "收货地址 ADDRESS"
    color: purple
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "主键"
      - name: user_id
        type: BIGINT
        fk: user
        comment: "所属用户"
      - name: receiver
        type: VARCHAR(50)
        comment: "收件人"
      - name: detail
        type: VARCHAR(255)
        comment: "详细地址"

relationships:
  - from: order
    to: user
    type: "N:1"
    label: "下单"
  - from: order
    to: address
    type: "N:1"
    label: "收货至"
  - from: order_item
    to: order
    type: "N:1"
    label: "属于"
  - from: order_item
    to: product
    type: "N:1"
    label: "包含商品"
  - from: address
    to: user
    type: "N:1"
    label: "归属"
