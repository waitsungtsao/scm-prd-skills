diagram:
  title: "Order ER Diagram"
  type: er

entities:
  - id: order
    label: "Order"
    color: blue
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "Primary key"
      - name: customer_id
        type: BIGINT
        fk: customer
        comment: "Customer FK"
      - name: status
        type: VARCHAR(20)
        comment: "Order status"
  - id: customer
    label: "Customer"
    color: green
    fields:
      - name: id
        type: BIGINT
        pk: true
        comment: "Primary key"
      - name: name
        type: VARCHAR(100)
        comment: "Customer name"

relationships:
  - from: order
    to: customer
    type: "N:1"
    label: "belongs to"
