# 供应链领域术语表 (SCM Glossary)
#
# 本文件由 scm-knowledge-curator 技能维护，scm-prd-workflow 技能在启动时读取。
# 格式规范：每个术语为一个 YAML 条目，字段定义见下方。
#
# 字段说明：
#   term:        术语名称（中文）
#   english:     英文名称/缩写（可选）
#   definition:  术语定义（一句话，精确无歧义）
#   domain:      所属业务领域列表（可选值：OMS, WMS, TMS, BMS, common）
#   related:     关联术语列表（可选）
#   source:      信息来源（interview=口述, document=文档, inference=推测, observation=观察）
#   confirmed:   确认状态（true=用户确认, partial=大方向确认但细节待补充, false=未经确认）
#
# 使用约定：
#   - 同一概念只定义一次，不同领域通过 domain 列表区分
#   - PRD 中使用术语时应与本表中的 term 字段保持一致
#   - 如本表不存在或为空，PRD Workflow 将跳过术语校验（优雅降级）

glossary:
  - term: 出库单
    english: Outbound Order
    definition: 仓库根据订单或调拨指令生成的出库作业单据，驱动拣货、复核、打包、发运流程
    domain: [WMS]
    related: [拣货单, 发货单]
    source: document
    confirmed: true

  - term: 履约
    english: Fulfillment
    definition: 从接收客户订单到完成交付的全过程，包括订单处理、仓储作业、运输配送
    domain: [OMS, WMS, TMS]
    related: [订单, 出库单, 运单]
    source: interview
    confirmed: true

  - term: 分仓
    english: Warehouse Allocation
    definition: 系统根据规则（距离、库存、成本等）将订单分配到具体执行仓库的过程
    domain: [OMS, WMS]
    related: [履约, 库存]
    source: interview
    confirmed: partial
